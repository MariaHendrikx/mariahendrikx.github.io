<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Blog - Maria's 100 App Challenge</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .blog-hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 120px 0 80px;
            padding-top: calc(120px + 70px);
            text-align: center;
        }
        
        .blog-hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .blog-hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .blog-content {
            padding: 80px 0;
        }
        
        .blog-filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 0.5rem 1.5rem;
            border: 2px solid #e5e7eb;
            background: white;
            color: #6b7280;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .filter-btn.active,
        .filter-btn:hover {
            border-color: #2563eb;
            background: #2563eb;
            color: white;
        }
        
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .blog-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
        }
        
        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }
        
        .blog-image {
            height: 200px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
        }
        
        .blog-content-card {
            padding: 2rem;
        }
        
        .blog-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        
        .blog-date {
            color: #6b7280;
        }
        
        .blog-category {
            color: #2563eb;
            font-weight: 500;
        }
        
        .blog-content-card h3 {
            margin-bottom: 1rem;
            font-size: 1.25rem;
        }
        
        .blog-content-card h3 a {
            color: #1f2937;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .blog-content-card h3 a:hover {
            color: #2563eb;
        }
        
        .blog-content-card p {
            color: #6b7280;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        
        .read-more {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }
        
        .read-more:hover {
            color: #1d4ed8;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 3rem;
        }
        
        .page-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #e5e7eb;
            background: white;
            color: #6b7280;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .page-btn:hover,
        .page-btn.active {
            border-color: #2563eb;
            background: #2563eb;
            color: white;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: #fbbf24;
        }
        
        @media (max-width: 768px) {
            .blog-hero {
                padding: 100px 0 60px;
            }

            .blog-hero h1 {
                font-size: 2rem;
            }

            .blog-hero p {
                font-size: 1rem;
            }

            .blog-content {
                padding: 60px 0;
            }

            .blog-filters {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.5rem;
            }

            .filter-btn {
                padding: 0.4rem 1rem;
                font-size: 0.875rem;
            }

            .blog-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .blog-image {
                height: 150px;
                font-size: 2rem;
            }

            .blog-content-card {
                padding: 1.5rem;
            }

            .blog-content-card h3 {
                font-size: 1.1rem;
            }

            .pagination {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 480px) {
            .blog-hero h1 {
                font-size: 1.75rem;
            }

            .blog-filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-btn {
                width: 100%;
                text-align: center;
            }

            .blog-image {
                height: 120px;
                font-size: 1.5rem;
            }

            .blog-content-card {
                padding: 1.25rem;
            }

            .blog-meta {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="../index.html"><i class="fas fa-rocket"></i> 100 App Challenge</a>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="../index.html#home" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="../index.html#about" class="nav-link">About</a>
                </li>
                <li class="nav-item">
                    <a href="../index.html#progress" class="nav-link">Progress</a>
                </li>
                <li class="nav-item">
                    <a href="../index.html#blog" class="nav-link">Blog</a>
                </li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- Blog Hero -->
    <section class="blog-hero">
        <div class="container">
            <a href="../index.html#blog" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Back to Home
            </a>
            <h1>Challenge Blog</h1>
            <p>Documenting the journey of building 100 apps in 100 days - lessons learned, challenges faced, and insights gained</p>
        </div>
    </section>

    <!-- Blog Content -->
    <section class="blog-content">
        <div class="container">
            <div class="blog-filters">
                <button class="filter-btn active" data-category="all">All Posts</button>
                <button class="filter-btn" data-category="kickoff">Kickoff</button>
                <button class="filter-btn" data-category="setup">Setup</button>
                <button class="filter-btn" data-category="planning">Planning</button>
                <button class="filter-btn" data-category="development">Development</button>
            </div>

            <div class="blog-grid" id="blogGrid">
                <!-- Blog cards will be dynamically loaded here -->
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-text">
                    <p>&copy; <span class="copyright-year">2024</span> Maria Hendrikx. All rights reserved.</p>
                </div>
                <div class="footer-links">
                    <a href="../index.html#home">Home</a>
                    <a href="../index.html#about">About</a>
                    <a href="../index.html#progress">Progress</a>
                    <a href="../index.html#blog">Blog</a>
                </div>
                <div class="social-links">
                    <a href="https://github.com/mariahendrikx" class="social-link"><i class="fab fa-github"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-linkedin"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Load blog posts dynamically
        async function loadBlogPosts() {
            try {
                const response = await fetch('blog-index.json');
                if (!response.ok) throw new Error('Failed to load blog index');
                
                const blogFiles = await response.json();
                const blogGrid = document.getElementById('blogGrid');
                
                for (const filename of blogFiles) {
                    try {
                        const fileResponse = await fetch(filename);
                        if (!fileResponse.ok) continue;
                        
                        const markdown = await fileResponse.text();
                        
                        // Extract title and category from markdown
                        const titleMatch = markdown.match(/^#\s+(.+)$/m);
                        const categoryMatch = markdown.match(/\*\*Category:\*\s+(.+)$/m);
                        
                        const title = titleMatch ? titleMatch[1] : 'Untitled';
                        const category = categoryMatch ? categoryMatch[1].toLowerCase() : 'general';
                        
                        // Parse date from filename if it follows YYYYMMDD format
                        const dateMatch = filename.match(/(\d{8})/);
                        let dateDisplay = 'Unknown Date';
                        
                        if (dateMatch) {
                            const dateStr = dateMatch[1];
                            const year = parseInt(dateStr.substring(0, 4));
                            const month = parseInt(dateStr.substring(4, 6)) - 1;
                            const day = parseInt(dateStr.substring(6, 8));
                            const date = new Date(year, month, day);
                            dateDisplay = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                        }
                        
                        // Create blog card
                        const blogCard = document.createElement('article');
                        blogCard.className = 'blog-card';
                        blogCard.setAttribute('data-category', category);
                        blogCard.innerHTML = `
                            <div class="blog-image">
                                <i class="fas fa-file-alt"></i>
                            </div>
                            <div class="blog-content-card">
                                <div class="blog-meta">
                                    <span class="blog-date">${dateDisplay}</span>
                                    <span class="blog-category">${category}</span>
                                </div>
                                <h3><a href="post.html?post=${filename}">${title}</a></h3>
                                <p>Click to read more about this post.</p>
                                <a href="post.html?post=${filename}" class="read-more">Read More <i class="fas fa-arrow-right"></i></a>
                            </div>
                        `;
                        
                        blogGrid.appendChild(blogCard);
                    } catch (error) {
                        console.error(`Error loading ${filename}:`, error);
                    }
                }
                
                // Initialize filtering after loading posts
                initializeFiltering();
            } catch (error) {
                console.error('Error loading blog posts:', error);
                document.getElementById('blogGrid').innerHTML = '<p>Error loading blog posts.</p>';
            }
        }
        
        // Blog filtering functionality
        function initializeFiltering() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    const category = this.getAttribute('data-category');
                    const blogCards = document.querySelectorAll('.blog-card');
                    
                    blogCards.forEach(card => {
                        if (category === 'all' || card.getAttribute('data-category') === category) {
                            card.style.display = 'block';
                            card.style.animation = 'fadeInUp 0.6s ease-out';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });
            });
        }

        // Load blog posts when page loads
        document.addEventListener('DOMContentLoaded', loadBlogPosts);
    </script>
</body>
</html>
